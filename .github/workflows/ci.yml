name: ci

on:
  pull_request:
    paths-ignore: ["**.md", ".justfile"]
  push:
    branches: [main]
    paths-ignore: ["**.md", ".justfile"]
  workflow_dispatch:

concurrency:
  group: ${{github.workflow}}-${{github.ref_name}}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix: { platform: [ubuntu-latest, macos-latest] }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3
      - run: just test
